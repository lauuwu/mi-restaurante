services:
  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      DB_HOST: postgres
      DB_NAME: restaurante
      DB_USER: postgres
      DB_PASSWORD: restaurante123
    depends_on:
      - postgres

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: restaurante
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: restaurante123
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
