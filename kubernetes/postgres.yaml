apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: restaurante
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS platos (
      id SERIAL PRIMARY KEY,
      nombre VARCHAR(100),
      descripcion TEXT,
      precio DECIMAL(10,2)
    );

    INSERT INTO platos (nombre, descripcion, precio) VALUES
      ('Milanesa', 'Milanesa de ternera con papas fritas', 1500.00),
      ('Empanadas', 'Docena de empanadas de carne', 1200.00),
      ('Asado', 'Tira de asado con chimichurri', 2500.00);
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: restaurante
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15
        env:
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: db-config
              key: DB_NAME
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: DB_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: DB_PASSWORD
        - name: POSTGRES_INITDB_ARGS
          value: "--encoding=UTF8"
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
        - name: postgres-init
          mountPath: /docker-entrypoint-initdb.d
      volumes:
      - name: postgres-data
        emptyDir: {}
      - name: postgres-init
        configMap:
          name: postgres-init
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: restaurante
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
